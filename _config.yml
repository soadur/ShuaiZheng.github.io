# Site settings
title: ShuaiZheng
SEOTitle: ShuaiZheng
header-img: img/home-bg.jpg
email: yourname@gmail.com
description: "这里是 @ShuaiZheng 的个人博客"
keyword: "ShuaiZheng, 博客, 个人网站"
url: "https://soadur.github.io" # your host, for absolute URL
baseurl: "/ShuaiZheng.github.io" # project site subpath

# Publish posts or collection documents with a future date.
future: true

# SNS settings
social_links:
  - { name: "GitHub", url: "https://github.com/ShuaiZheng", icon: "github" }
  - { name: "Twitter", url: "https://twitter.com/yourname", icon: "twitter" }
  - { name: "微博", url: "http://weibo.com/yourname", icon: "weibo" }
  - { name: "知乎", url: "https://www.zhihu.com/people/yourname", text: "知" }
  - { name: "B站", url: "https://space.bilibili.com/jjxxxxkkky", text: "B" }
  - { name: "抖音", url: "https://www.douyin.com/user/Ciatek1", text: "抖" }
  - { name: "小红书", url: "https://www.xiaohongshu.com/user/profile/Ciatek1", text: "薯" }

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
# disqus_username: yourname

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
# ga_track_id: "UA-xxxxxx-xx" # Format: UA-xxxxxx-xx
# ga_domain: example.com

# Sidebar settings
sidebar: true # whether or not using Sidebar.
sidebar-about-description: "个人简介写在这里"
sidebar-avatar: https://github.com/ShuaiZheng.png # use absolute URL, seeing it's used in both `/` and `/about/`

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 1 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

